services:
  - type: web
    name: ai-saas-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_NAME
        value: AI SaaS API
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./ai_saas.db
      - key: FRONTEND_URL
        value: "*"
    healthCheckPath: /health
